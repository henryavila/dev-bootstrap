name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          ignore_paths: docs windows
          severity: warning

      - name: bash syntax
        run: |
          set -e
          mapfile -t scripts < <(find bootstrap.sh lib topics -type f \( -name '*.sh' -o -name 'bootstrap.sh' \) | sort -u)
          for f in "${scripts[@]}"; do
            printf '→ bash -n %s\n' "$f"
            bash -n "$f"
          done
          printf '✓ all scripts parse cleanly (%d files)\n' "${#scripts[@]}"
