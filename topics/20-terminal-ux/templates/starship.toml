"$schema" = 'https://starship.rs/config-schema.json'

# ---------- Top-level config (MUST come before any [section]) ----------
# TOML gotcha: keys without a preceding [header] belong to the last declared
# section. If add_newline or format are placed after [palettes.catppuccin_mocha],
# the starship parser tries to read them as palette colors and errors with
# "invalid type: boolean true, expected a string".
palette = "catppuccin_mocha"
add_newline = true
format = """
[╭─](surface0) $username$hostname$directory$git_branch$git_status$git_state
[╰─](surface0)$character"""

# ---------- Catppuccin Mocha palette ----------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# ---------- Modules ----------
[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](red)"
vimcmd_symbol  = "[❮](lavender)"

[username]
style_user     = "lavender"
style_root     = "red"
format         = "[$user]($style) "
disabled       = false
show_always    = false

[hostname]
ssh_only       = true
format         = "on [$hostname](peach) "

[directory]
style          = "blue"
format         = "in [$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
read_only      = " "

[git_branch]
symbol         = " "
style          = "mauve"
format         = "on [$symbol$branch]($style) "

[git_status]
style          = "red"
format         = "([$all_status$ahead_behind]($style) )"
conflicted     = "="
ahead          = "⇡${count}"
behind         = "⇣${count}"
diverged       = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date     = ""
untracked      = "?"
stashed        = "$"
modified       = "!"
staged         = "+"
renamed        = "»"
deleted        = "✘"

[git_state]
format         = "[\\($state( $progress_current/$progress_total)\\)]($style) "
style          = "peach"

[nodejs]
symbol         = " "
format         = "via [$symbol($version )]($style)"
style          = "green"

[php]
symbol         = " "
format         = "via [$symbol($version )]($style)"
style          = "mauve"

[python]
symbol         = " "
format         = "via [$symbol($version )]($style)"
style          = "yellow"

[cmd_duration]
min_time       = 2000
format         = "took [$duration]($style) "
style          = "yellow"
