# ~/.tmux.conf — managed by dev-bootstrap / 40-tmux

# Default shell — resolve from the authoritative login-shell registry,
# NOT from $SHELL. Rationale: $SHELL is frozen at login time and goes
# stale after chsh — long-lived ssh/mosh sessions that pre-date the
# shell change continue exporting the old value, so tmux started from
# them caches the wrong shell for every new pane. The old server only
# notices after `tmux kill-server` + reconnect. `run-shell` below
# executes at server-start (and every source-file reload) and queries:
#   Linux: getent passwd — authoritative /etc/passwd (+ NSS for LDAP)
#   macOS: dscl . -read /Users/$USER UserShell — authoritative DS
# and sets default-shell accordingly. Falls back gracefully if both
# lookups fail (preserves whatever default tmux had).
#
# Must be ONE line: tmux.conf treats backslash-newline as literal lines,
# NOT a shell continuation. Multi-line would split the argument into
# several tmux commands and render garbage like `execute: 0808/0808/0d0d`.
# `-b` backgrounds it so the helper's stdout never bubbles into the
# attached client's display. Redirections inside the command suppress
# dscl's errors on Linux and getent's errors on Mac.
#
# Companion detection in 20-terminal-ux's chsh block nags the user
# when $SHELL ≠ /etc/passwd or when an existing tmux server has a
# stale SHELL in its env.
run-shell -b 'S="$(getent passwd "$USER" 2>/dev/null | cut -d: -f7)"; [ -z "$S" ] && S="$(dscl . -read "/Users/$USER" UserShell 2>/dev/null | cut -d" " -f2)"; [ -n "$S" ] && [ -x "$S" ] && tmux set-option -g default-shell "$S" >/dev/null 2>&1'

# Prefix: Ctrl-a (screen-style), easier to reach than Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse + terminal capabilities
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*256col*:Tc'
set -sg escape-time 10

# Indexing: start at 1, renumber as windows close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Splits — intuitive characters, preserve cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "reloaded tmux.conf"

# History & copy-mode
set -g history-limit 100000
setw -g mode-keys vi

# Copy-mode vi bindings — fish/emacs-like selection on top of vi motions.
# Prefix-[ enters copy-mode; 'v' starts selection, 'y' yanks and exits.
# Bound against {copy-mode-vi} table explicitly so they don't collide with
# the default root-level letter bindings.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Status bar position — top keeps it visible on phone clients where
# the on-screen keyboard eats the bottom of the viewport.
set -g status-position top
set -g status-interval 5

# ─── Plugins via TPM ────────────────────────────────────────────────
# TPM (tmux plugin manager) lives at ~/.tmux/plugins/tpm, installed by
# dev-bootstrap/topics/40-tmux/install.{wsl,mac}.sh along with a pre-
# cloned catppuccin/tmux v1.0.3 at ~/.tmux/plugins/tmux — so the theme
# is active on the first tmux launch with no `prefix + I` needed.
#
# To add more plugins: append `set -g @plugin '<owner>/<name>'` below,
# run `prefix + I` in a live session (or re-run bootstrap to pre-clone).
#
# Pin rationale: v1.0.3 uses the simple @catppuccin_* variables API used
# below. v2 introduced a module-based API that'd need a bigger rewrite.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v1.0.3'

# Catppuccin v1 config (applies at theme load time)
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_tabs_enabled on
set -g @catppuccin_date_time "%Y-%m-%d %H:%M"

# Status bar background — darker than the plugin default.
# Default is "default" → which the plugin maps to @thm_mantle (#181825),
# a tone that reads as "warm/coffee grey" on monitors with high gamma.
# Switch to @thm_crust (#11111b), the darkest token in the Mocha
# palette — keeps coherence with the rest of the theme while pushing
# the bar closer to black. Lazy-expanded by `#{E:...}` inside the
# plugin, so referencing @thm_crust before the theme loads is safe.
# For a true black, replace with "#000000". For OLED-but-not-cold,
# "#0a0a14" works well.
set -g @catppuccin_status_background "#{@thm_crust}"

# Square the leading edge of any catppuccin status module that might be
# used (e.g. the session module on status-left). v1.0.3 ships
# `left=""` (U+E0B6, rounded half-circle) by default; `█` keeps module
# edges flush with the square window list.
set -g @catppuccin_status_left_separator "█"

# TPM boot — must come BEFORE the status-right additions below so that
# the @catppuccin_status_host variable is defined when we reference it.
# Silently degrades to a default status bar if ~/.tmux/plugins/tpm is
# missing (new machine before bootstrap), not an error.
if-shell "[ -f $HOME/.tmux/plugins/tpm/tpm ]" \
    "run '$HOME/.tmux/plugins/tpm/tpm'"

# ─── Status right: directory + hostname, dim unified blocks ─────────────
# Two blocks, each a single contiguous rectangle with a uniform surface_1
# background so the icon and the text share the same fill (not the plugin
# default `status_fill=icon`, which colors only the icon square and leaves
# the text floating on the bar bg — looks half-finished).
#
# Why build these manually instead of reusing Catppuccin's `host` /
# `directory` modules: the plugin applies `status_fill` GLOBALLY to every
# status module, so switching it to `all` to fix the half-filled look
# would also recolor the session block on status-left, which we do NOT
# want to touch. Manual composition gives per-block control.
#
# Palette (from themes/catppuccin_mocha_tmux.conf, loaded by TPM above):
#   bg:     @thm_surface_1  (#45475a) — one step above bar bg, soft
#   text:   @thm_subtext_1  (#a6adc8) — dim but legible
#   icons:  @thm_teal / @thm_mauve   — quiet accents, two per-block
#
# Why BOTH blocks matter for multi-machine work:
#   - `󰉋 #{b:pane_current_path}` — basename of the focused pane's cwd.
#     Essential inside Claude Code / vim / less fullscreen where the p10k
#     dir segment is hidden. Basename (not full path) keeps the bar short
#     when deep in trees; swap to `#{s|$HOME|~|:pane_current_path}` for
#     full path with ~ expansion.
#   - `󰒋 #H`  — hostname.
#
# Why UNCONDITIONAL `set -g` (no `if-shell` wrapper):
# An earlier revision wrapped this in `if-shell "[ -d ~/.tmux/plugins/tmux ]"`
# under the (wrong) belief that catppuccin v1.0.3 set its own status-right
# default that we'd have to clobber. v1.0.3 actually does NOT touch
# status-right unless you explicitly invoke `#{E:@catppuccin_status_*}` —
# verified in catppuccin_tmux.conf and catppuccin_options_tmux.conf, neither
# of which contains a `status-right` line. The `if-shell` wrapper was the
# real source of "right side goes blank": if the test ever evaluated false
# (race with TPM, server started before plugins were cloned, partial
# source-file), neither branch ran and status-right stayed at whatever
# stale value the server held — empty in the worst case.
#
# Unconditional `set -g` is safe because tmux silently expands undefined
# `#{@thm_*}` to empty string. On a fresh machine pre-bootstrap, the
# colored rectangles disappear but `#H` and `#{b:pane_current_path}`
# still render — graceful degradation without a branching test.
set -g status-right-length 120
set -g status-right "#[fg=#{@thm_surface_1}]█#[bg=#{@thm_surface_1},fg=#{@thm_teal}] 󰉋 #[fg=#{@thm_subtext_1}]#{b:pane_current_path} #[fg=#{@thm_surface_1},bg=default]█ #[fg=#{@thm_surface_1}]█#[bg=#{@thm_surface_1},fg=#{@thm_mauve}] 󰒋 #[fg=#{@thm_subtext_1}]#H #[fg=#{@thm_surface_1},bg=default]█"
