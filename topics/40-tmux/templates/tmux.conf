# ~/.tmux.conf — managed by dev-bootstrap / 40-tmux

# Prefix: Ctrl-a (screen-style), easier to reach than Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse + terminal capabilities
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*256col*:Tc'
set -sg escape-time 10

# Indexing: start at 1, renumber as windows close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Splits — intuitive characters, preserve cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "reloaded tmux.conf"

# History & copy-mode
set -g history-limit 100000
setw -g mode-keys vi

# Copy-mode vi bindings — fish/emacs-like selection on top of vi motions.
# Prefix-[ enters copy-mode; 'v' starts selection, 'y' yanks and exits.
# Bound against {copy-mode-vi} table explicitly so they don't collide with
# the default root-level letter bindings.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Status bar — Catppuccin-ish minimal.
# status-position top: keeps the statusline visible on phone clients
# where pane content scrolls above; the bottom of the viewport is the
# on-screen keyboard, so status at top stays reachable.
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#181825,fg=#cdd6f4"
set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bold] #S #[default]| "
set -g status-right "#[fg=#a6adc8]%Y-%m-%d %H:%M "
setw -g window-status-current-style "fg=#a6e3a1,bold"
setw -g window-status-style "fg=#6c7086"
