# Supported PHP versions.
# One version per line. Order doesn't matter — `sort -V | tail -1` picks the
# default (last one). Add a new line when a new major/minor lands and the
# entire stack (installer, menu, nginx templates) handles it automatically.
#
# Removing a line removes the option from the interactive menu. Already-
# installed versions on disk stay installed (no automatic cleanup) — run
# `sudo apt-get remove php8.X-*` manually if you want to purge.
