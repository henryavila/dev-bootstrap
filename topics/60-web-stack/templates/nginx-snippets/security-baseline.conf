# Managed by dev-bootstrap / 60-web-stack.
# Shared security + performance baseline for every server block we deploy.
# Include via: include snippets/dev-bootstrap-security.conf;
#
# This is a DEV baseline — reasonable defaults for local Laravel + frontend
# work, NOT a prod hardening profile. Notable choices:
#   - server_tokens off   → never advertise nginx version
#   - 20M upload limit    → Laravel default is 2M, realistic for asset uploads
#   - gzip on             → compresses JSON/JS/CSS responses (~70% smaller)
#   - security headers    → nosniff + frame-ancestors sane defaults
# HSTS is deliberately NOT added here — dev certs from mkcert shouldn't
# pin users into HTTPS-only policies.

server_tokens off;
client_max_body_size 20M;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options        "SAMEORIGIN" always;
add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/wasm
    font/ttf
    font/otf
    font/woff
    font/woff2
    image/svg+xml;
