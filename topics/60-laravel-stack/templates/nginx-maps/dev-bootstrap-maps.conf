# Managed by dev-bootstrap / 60-laravel-stack.
# Loaded inside the http{} block via nginx's conf.d/ auto-include.
# Defines shared `map` directives used by our server blocks.
#
# $connection_upgrade — bridges HTTP/1.1 upgrade headers for WebSocket /
# HMR through the reverse proxy catchall. Without this, browser can't
# upgrade the connection and HMR breaks silently.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
