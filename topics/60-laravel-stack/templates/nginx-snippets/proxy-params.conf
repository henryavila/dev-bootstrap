# Managed by dev-bootstrap / 60-laravel-stack.
# Reverse-proxy parameters for dev servers (Nuxt / Vite / Next / etc.).
# Include inside a `location` that proxy_pass-es to a backend.
#
# Why each block:
#   - http_version 1.1 + Connection header from map → enables keepalive AND
#     WebSocket upgrades. Dropping either breaks HMR on most frameworks.
#   - 7 forwarding headers → backend sees real client IP + scheme + port,
#     needed by Laravel's TrustProxies middleware, Nuxt auto-URL detection,
#     NextAuth callback URLs, etc.
#   - Timeouts cranked up to 3600s read → SSE, LLM streaming, long-poll all
#     survive. Default 60s kills these mid-stream.
#   - Buffering OFF → HMR events and SSE reach the browser as they're
#     emitted by the backend, not after the full response.

proxy_http_version 1.1;

# Standard forwarding headers (all 7 — less causes subtle bugs)
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

# WebSocket / HMR upgrade — reads $connection_upgrade map
# (defined in conf.d/dev-bootstrap-maps.conf, deployed alongside this)
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Dev-friendly timeouts
proxy_connect_timeout  10s;
proxy_send_timeout     60s;
proxy_read_timeout     3600s;

# No buffering — HMR + SSE hit the browser live
proxy_buffering         off;
proxy_request_buffering off;
proxy_cache_bypass      $http_upgrade;

# Dev server handles its own redirects — don't rewrite Location headers
proxy_redirect off;
